# General
setw -g mode-keys vi
setw -g monitor-activity on
set -g visual-activity on
set-option -g pane-active-border-style bg=blue
set-option -g focus-events on

# マウス操作を tmux に拾わせ、ペイン単位の選択/スクロールにする
# (claude 等 mouse 対応アプリのペインではアプリ側へ転送される)
set -g mouse on

# アプリ(claude等)の OSC52 をそのまま外側端末へ転送しクリップボードに届かせる
# (外側端末が OSC52 対応している必要あり。macOS Terminal.app は非対応)
set -g set-clipboard on

## Status bar
set -g status-interval 1
set -g status-style bg=black
set -g status-style fg=white
set -g status-style bold
set -g status-justify centre
set -g status-left "#[fg=green,bold]#(hostname -s)#[default][#S]"

set -g history-limit 100000
setw -g window-status-current-style fg=cyan,underscore

## Key mappings (prefix == Space)
unbind ^b
set -g prefix C-Space

# Saner splitting.
bind c new-window -c "#{pane_current_path}"
bind h split-window -c "#{pane_current_path}" -h \; select-layout even-horizontal
bind v split-window -c "#{pane_current_path}" -v \; select-layout even-vertical
bind C-y run "tmux save-buffer - | xclip -i"

# Rebalance remaining panes when one is closed.
# - after-kill-pane: prefix+x などコマンド経由の閉じ
# - pane-exited: shell の exit / Ctrl-D での閉じ
set-hook -g after-kill-pane "select-layout even-horizontal"
set-hook -g pane-exited "select-layout even-horizontal"

# Autorename sanely.
setw -g automatic-rename on

## by OS conf
if-shell "uname | grep -q Darwin" "source-file $HOME/.tmux_macosx.conf" "source-file $HOME/.tmux_linux.conf"
